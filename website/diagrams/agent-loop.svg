<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Inter, -apple-system, sans-serif" font-size="14">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c4825a"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2d2d2d">Agent Loop (Agent 循环)</text>
  <!-- Step 1: User Input -->
  <rect x="200" y="50" width="200" height="50" rx="10" fill="#a5d8ff" stroke="#4dabf7" stroke-width="1.5"/>
  <text x="300" y="80" text-anchor="middle" font-weight="600" fill="#1864ab">用户输入 Prompt</text>
  <line x1="300" y1="100" x2="300" y2="130" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 2: Call API -->
  <rect x="200" y="135" width="200" height="50" rx="10" fill="#b2f2bb" stroke="#69db7c" stroke-width="1.5"/>
  <text x="300" y="165" text-anchor="middle" font-weight="600" fill="#2b8a3e">调用 Claude API</text>
  <line x1="300" y1="185" x2="300" y2="215" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3: Parse Response -->
  <rect x="200" y="220" width="200" height="50" rx="10" fill="#ffd8a8" stroke="#ffa94d" stroke-width="1.5"/>
  <text x="300" y="250" text-anchor="middle" font-weight="600" fill="#e67700">解析响应</text>
  <line x1="300" y1="270" x2="300" y2="300" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 4: Decision Diamond -->
  <polygon points="300,305 400,355 300,405 200,355" fill="#ffec99" stroke="#fcc419" stroke-width="1.5"/>
  <text x="300" y="360" text-anchor="middle" font-weight="600" fill="#e67700">有工具调用?</text>
  <!-- Yes branch -->
  <line x1="400" y1="355" x2="470" y2="355" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="345" font-size="12" fill="#2b8a3e" font-weight="600">是</text>
  <rect x="475" y="330" width="110" height="50" rx="10" fill="#d0bfff" stroke="#9775fa" stroke-width="1.5"/>
  <text x="530" y="360" text-anchor="middle" font-weight="600" fill="#5f3dc4">执行工具</text>
  <!-- Loop back arrow -->
  <line x1="530" y1="330" x2="530" y2="165" stroke="#c4825a" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="530" y1="165" x2="405" y2="165" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="540" y="250" font-size="11" fill="#c4825a" font-style="italic">循环</text>
  <!-- No branch -->
  <line x1="300" y1="405" x2="300" y2="440" stroke="#c4825a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="315" y="425" font-size="12" fill="#c0392b" font-weight="600">否</text>
  <rect x="200" y="445" width="200" height="50" rx="10" fill="#ffc9c9" stroke="#ff8787" stroke-width="1.5"/>
  <text x="300" y="475" text-anchor="middle" font-weight="600" fill="#c92a2a">返回最终回复</text>
</svg>
